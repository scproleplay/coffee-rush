<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Escape ☕🏃</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Coffee Escape — self-contained game styles.
       Designed mobile-first: the stage fills the available width and
       uses a flexible aspect ratio so it stays usable on 320px phones
       through to desktop. */
    .ce-app {
      max-width: 1100px;
      margin: 0 auto;
      -webkit-text-size-adjust: 100%;
      /* Generous top padding so the title is never clipped. */
      padding: 28px 20px 16px;
    }

    /* On Coffee Escape the main element does NOT stretch with
       flex: 1 (the shared .arcade-main has flex: 1). The main
       takes its content's natural height, so the header, stage,
       and footer stack naturally from the top — no vertical
       centering, no big gap above the header. The footer sits
       directly below the game. */
    .ce-app .arcade-main {
      flex: 0 0 auto;
    }

    /* The stage is the 3D canvas. It fills the page width up to 860px.
       On portrait phones, we use a fixed height in vh so the entire
       page (header + stage + footer) fits in the viewport on a single
       screen without scrolling. The Three.js renderer reads the
       rendered size to set its camera aspect ratio. */
    .ce-stage {
      position: relative;
      width: 100%;
      /* Removed the 860px max-width cap so the stage fills the
         full page content width (up to 888px on desktop with
         16px padding each side). The 16:9 aspect ratio caps the
         height, so the stage is now ~500px tall on desktop
         instead of ~484px — a modest but noticeable improvement. */
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      background: #fff7e6;
      border-radius: 20px;
      overflow: hidden;
      /* Polished frame: warm shadow that matches the theme, plus a
         subtle 1px orange-tinted border to read as a "viewport." */
      border: 1px solid rgba(178, 94, 0, 0.18);
      box-shadow:
        0 1px 2px rgba(180, 90, 0, 0.10),
        0 8px 24px rgba(180, 90, 0, 0.22),
        inset 0 0 0 1px rgba(255, 255, 255, 0.4);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    @media (max-aspect-ratio: 1/1) {
      /* Portrait phones: keep the stage short so the page (header +
         stage + footer) fits in the viewport. ~52vh leaves room for
         the header, footer, and any browser chrome. */
      .ce-stage {
        aspect-ratio: auto;
        height: 52vh;
        max-height: 560px;
        min-height: 320px;
      }
    }
    @media (max-aspect-ratio: 1/1) and (max-width: 380px) {
      /* Very small portrait phones: slightly more height to keep the
         cup readable, but still leaves room for the rest of the page. */
      .ce-stage { height: 58vh; }
    }
    @media (max-aspect-ratio: 1/1) and (min-height: 700px) {
      /* Tablets in portrait (iPad, etc): cap so the page fits without
         scrolling. */
      .ce-stage { max-height: 520px; }
    }
    @media (min-width: 1024px) and (min-aspect-ratio: 4/3) {
      /* Desktop / landscape: larger stage for immersion. */
      .ce-stage { aspect-ratio: 16 / 9; height: auto; max-height: 680px; }
    }

    canvas.ce-canvas {
      display: block;
      width: 100%;
      height: 100%;
      /* The stage already has touch-action: none, but the canvas
         inside it has its own touch behavior. Set this on the
         canvas too so the browser doesn't try to start a pan or
         zoom gesture on a touch, which can swallow swipes and
         add the iOS 300ms tap delay. */
      touch-action: none;
    }

    /* Header — override the shared .title / .subtitle (which are
       white-on-warm-gradient, low contrast) with darker, warmer
       text that reads clearly on the cream background. */
    .ce-app .header { margin-bottom: 10px; margin-top: 4px; }
    .ce-app .title {
      color: #3a1f00;
      font-weight: 900;
      letter-spacing: -0.01em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
    }
    .ce-app .subtitle {
      color: #6b3a14;
      font-weight: 600;
    }

    /* Action button bar — fixed at the bottom-right of the stage.
       Two circular buttons side by side: BOOST on the left, JUMP on
       the right. Both have a 64×64 minimum hit target for a11y.
       Hidden on devices with a real keyboard (desktop). */
    .ce-actions-bar {
      position: absolute;
      right: 14px;
      bottom: 14px;
      display: flex;
      gap: 10px;
      z-index: 4;
    }
    @media (hover: hover) and (pointer: fine) {
      .ce-actions-bar { display: none; }
    }
    .ce-jump-btn,
    .ce-boost-btn {
      width: 76px;
      height: 76px;
      min-width: 64px;
      min-height: 64px;
      border-radius: 50%;
      border: none;
      color: #fff;
      font-weight: 800;
      font-size: 0.85rem;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      line-height: 1;
    }
    .ce-jump-btn { background: linear-gradient(180deg, #ffb347, #ff8800); }
    .ce-boost-btn {
      background: linear-gradient(180deg, #4ec0ff, #2080d0);
      position: relative;
      overflow: hidden;
    }
    .ce-jump-btn:active,
    .ce-boost-btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
    }
    .ce-jump-btn .ce-btn-icon,
    .ce-boost-btn .ce-btn-icon { font-size: 1.4rem; line-height: 1; }
    /* Fill bar inside the boost button. */
    .ce-boost-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 0%;
      background: rgba(255, 255, 255, 0.45);
      transition: height 0.15s ease-out;
      pointer-events: none;
    }
    .ce-boost-btn.is-active { animation: ce-boost-pulse 0.4s ease-in-out infinite; }
    @keyframes ce-boost-pulse {
      0%, 100% { box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25), 0 0 0 0 rgba(78, 192, 255, 0.6); }
      50%      { box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25), 0 0 0 10px rgba(78, 192, 255, 0); }
    }
    /* Extra-small phones: shrink the buttons a bit. */
    @media (max-width: 360px) {
      .ce-jump-btn, .ce-boost-btn { width: 68px; height: 68px; }
    }

    /* Boost meter (bar in the bottom-left of the stage) */
    .ce-boost-hud {
      position: absolute;
      left: 12px;
      bottom: 16px;
      width: 130px;
      height: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fff7e0 100%);
      border: 1.5px solid #4ec0ff;
      border-radius: 999px;
      overflow: hidden;
      z-index: 3;
      pointer-events: none;
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.12),
        0 3px 8px rgba(78, 192, 255, 0.18);
    }
    .ce-boost-hud-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6ec6ff 0%, #2080d0 100%);
      transition: width 0.1s linear;
    }
    .ce-boost-hud-label {
      position: absolute;
      left: 12px;
      bottom: 36px;
      font-size: 0.75rem;
      font-weight: 800;
      color: #2080d0;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      z-index: 3;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
    }
    @media (max-width: 380px) {
      .ce-boost-hud { width: 100px; height: 14px; }
      .ce-boost-hud-label { font-size: 0.66rem; bottom: 32px; }
    }

    /* Generic overlay used by intro, start, and game-over */
    .ce-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Slightly transparent so the 3D world is faintly visible
         behind the card. Vignette around the edges to focus. */
      background: linear-gradient(180deg,
        rgba(255, 247, 230, 0.78) 0%,
        rgba(255, 235, 200, 0.84) 100%);
      backdrop-filter: blur(1.5px);
      -webkit-backdrop-filter: blur(1.5px);
      z-index: 5;
      padding: 18px;
      animation: ce-overlay-fade 0.4s ease-out;
    }
    @keyframes ce-overlay-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .ce-overlay[hidden] { display: none; }

    .ce-card {
      background: linear-gradient(180deg, #ffffff 0%, #fffaf0 100%);
      border-radius: 18px;
      padding: 24px 22px 22px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 1px 3px rgba(180, 90, 0, 0.18),
        0 12px 32px rgba(180, 90, 0, 0.22);
      border: 2px solid #ffb347;
      animation: ce-card-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes ce-card-in {
      from { transform: scale(0.85) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .ce-card h2 {
      margin: 0 0 8px;
      color: #b25e00;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .ce-card p {
      margin: 6px 0;
      color: #5a3a14;
      line-height: 1.45;
    }
    .ce-card .ce-tagline {
      color: #8a5a2c;
      font-size: 0.95rem;
      font-style: italic;
      margin: 0 0 10px;
    }
    @media (max-width: 380px) {
      .ce-card { padding: 18px 16px 16px; }
      .ce-card h2 { font-size: 1.4rem; }
      .ce-card p { font-size: 0.92rem; }
      .ce-card .ce-tagline { font-size: 0.88rem; }
    }

    /* "RUN!" stamp — appears briefly on the first run, animates in
       and out. Set on a child of the start overlay. */
    .ce-run-stamp {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%) rotate(-6deg) scale(0.6);
      font-size: clamp(2.2rem, 8vw, 3.6rem);
      font-weight: 900;
      color: #c0392b;
      text-shadow: 4px 4px 0 #fff, 6px 6px 0 rgba(0, 0, 0, 0.15);
      letter-spacing: 0.02em;
      opacity: 0;
      pointer-events: none;
      z-index: 6;
    }
    .ce-run-stamp.is-show {
      animation: ce-run-stamp 1.0s ease-out forwards;
    }
    @keyframes ce-run-stamp {
      0%   { transform: translateX(-50%) rotate(-6deg) scale(0.6); opacity: 0; }
      15%  { transform: translateX(-50%) rotate(-6deg) scale(1.2); opacity: 1; }
      60%  { transform: translateX(-50%) rotate(-6deg) scale(1.0); opacity: 1; }
      100% { transform: translateX(-50%) rotate(-6deg) scale(1.0); opacity: 0; }
    }

    .ce-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .ce-hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      z-index: 3;
      pointer-events: none;
    }
    .ce-hud-item {
      background: linear-gradient(180deg, #ffffff 0%, #fff7e0 100%);
      border: 1.5px solid #ffb347;
      border-radius: 14px;
      padding: 9px 16px;
      font-weight: 700;
      color: #5a3a14;
      box-shadow:
        0 1px 2px rgba(180, 90, 0, 0.18),
        0 4px 10px rgba(180, 90, 0, 0.20);
      display: flex;
      align-items: center;
      gap: 10px;
      font-variant-numeric: tabular-nums;
    }
    .ce-hud-item .ce-hud-label {
      font-size: 0.78rem;
      color: #b25e00;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
    }
    .ce-hud-item .ce-hud-value {
      font-size: 1.45rem;
      font-weight: 900;
      color: #3a1f00;
      letter-spacing: -0.01em;
      transition: color 0.2s, transform 0.2s;
    }
    .ce-hud-item .ce-hud-value.flash {
      color: #ff8800;
      transform: scale(1.20);
    }
    .ce-hud-best .ce-hud-value {
      color: #c0392b;
    }
    @media (max-width: 380px) {
      .ce-hud-item { padding: 6px 10px; gap: 6px; border-radius: 12px; }
      .ce-hud-item .ce-hud-label { font-size: 0.66rem; }
      .ce-hud-item .ce-hud-value { font-size: 1.1rem; }
    }

    .ce-result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 6px;
    }
    .ce-result-item {
      background: linear-gradient(180deg, #fff7e6 0%, #fff0d4 100%);
      border: 1.5px solid #ffb347;
      border-radius: 12px;
      padding: 10px 12px;
      position: relative;
    }
    .ce-result-item.is-best {
      background: linear-gradient(180deg, #fff4c2 0%, #ffd24a 100%);
      border-color: #b25e00;
      box-shadow: 0 0 16px rgba(255, 178, 0, 0.45);
      animation: ce-best-glow 1.6s ease-in-out infinite;
    }
    @keyframes ce-best-glow {
      0%, 100% { box-shadow: 0 0 16px rgba(255, 178, 0, 0.45); }
      50%      { box-shadow: 0 0 24px rgba(255, 178, 0, 0.75); }
    }
    .ce-result-label {
      display: block;
      font-size: 0.7rem;
      color: #b25e00;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 800;
    }
    .ce-result-value {
      display: block;
      font-size: 1.6rem;
      font-weight: 900;
      color: #6b3a0a;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .ce-result-value.final { color: #c0392b; }
    .ce-result-value.is-best { color: #b25e00; }
    @media (max-width: 380px) {
      .ce-result-grid { gap: 6px; }
      .ce-result-value { font-size: 1.3rem; }
    }

    .ce-new-best {
      display: inline-block;
      background: linear-gradient(135deg, #ffd24a 0%, #ff8800 100%);
      color: #fff;
      font-weight: 800;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      padding: 5px 14px;
      border-radius: 999px;
      margin: 2px 0 10px;
      box-shadow: 0 2px 8px rgba(255, 136, 0, 0.45);
      animation: ce-new-best-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                 ce-pulse 1.2s 0.6s infinite;
    }
    @keyframes ce-new-best-pop {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    @keyframes ce-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    /* Global leaderboard submit form (in the game-over card).
       Compact, matches the card's visual language. */
    .ce-lb-submit {
      margin: 6px 0 12px;
      text-align: left;
    }
    .ce-lb-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 800;
      color: #b25e00;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .ce-lb-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .ce-lb-input {
      flex: 1 1 auto;
      min-width: 0;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #3a1f00;
      background: #fff;
      border: 1.5px solid #ffb347;
      border-radius: 10px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .ce-lb-input:focus {
      border-color: #ff8800;
      box-shadow: 0 0 0 3px rgba(255, 136, 0, 0.18);
    }
    .ce-lb-btn {
      flex: 0 0 auto;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(180deg, #ffb347 0%, #ff8800 100%);
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(255, 136, 0, 0.30);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, box-shadow 0.15s ease;
    }
    .ce-lb-btn:hover { box-shadow: 0 3px 10px rgba(255, 136, 0, 0.45); }
    .ce-lb-btn:active { transform: translateY(1px); }
    .ce-lb-btn:disabled {
      background: #e6d6b0;
      color: #fff;
      cursor: not-allowed;
      box-shadow: none;
    }
    .ce-lb-status {
      min-height: 1.2em;
      margin-top: 6px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #b25e00;
    }
    .ce-lb-status.is-ok { color: #2e7d32; }
    .ce-lb-status.is-error { color: #c0392b; }
    @media (max-width: 380px) {
      .ce-lb-input { font-size: 0.95rem; padding: 7px 8px; }
      .ce-lb-btn { padding: 7px 12px; font-size: 0.88rem; }
    }

    /* Floating control hint — small compact overlay inside the
       stage, anchored at the bottom-center. Absolutely positioned
       so it doesn't participate in the page's flex layout (the
       page main is `display: flex` and we don't want the hint to
       become a sibling flex item that stretches to full height).
       pointer-events: none so taps fall through to the canvas. */
    .ce-floating-cta {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: inline-block;
      background: linear-gradient(180deg, #ffffff 0%, #fff7e0 100%);
      border: 1.5px solid #ffb347;
      border-radius: 999px;
      padding: 6px 14px;
      color: #5a3a14;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 6px rgba(180, 90, 0, 0.20);
      text-align: center;
      white-space: nowrap;
      /* Cap width so the pill never spans the whole canvas. Leaves
         room for the JUMP/BOOST action buttons on the right. */
      max-width: calc(100% - 180px);
      pointer-events: none;
      z-index: 2;
    }
    @keyframes ce-fade {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    /* Mobile: position the hint above the action buttons (which sit
       at the bottom-right) and make it smaller. Swap the text to
       the touch/swipe variant. */
    @media (max-width: 380px) {
      .ce-floating-cta {
        font-size: 0.72rem;
        padding: 5px 12px;
        /* Sit above the JUMP/BOOST buttons (which are 76px tall + 14px
           from the bottom = 90px from the bottom). */
        bottom: 100px;
        max-width: calc(100% - 32px);
      }
      .ce-floating-cta-desktop { display: none; }
      .ce-floating-cta-mobile  { display: inline; }
    }
    /* Desktop: show the keyboard hint, hide the touch hint. */
    @media (min-width: 381px) {
      .ce-floating-cta-desktop { display: inline; }
      .ce-floating-cta-mobile  { display: none; }
    }

    /* Start-screen control hints — same responsive pattern as the
       floating CTA. Desktop shows keyboard, mobile shows swipe. */
    .ce-hint-desktop { display: inline; }
    .ce-hint-mobile  { display: none; }
    @media (hover: none) and (pointer: coarse) {
      .ce-hint-desktop { display: none; }
      .ce-hint-mobile  { display: inline; }
    }

    /* Footer — tight 2-row layout so the page feels connected to
       the game. Tighter spacing, smaller text, row of action pills. */
    .ce-app .ce-footer {
      /* Tighter top margin so the footer sits closer to the stage.
         Was 14px; now 10px. */
      margin-top: 10px;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .ce-app .ce-footer-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .ce-app .ce-footer-meta {
      gap: 10px;
      color: #6b3a14;
      font-size: 0.78rem;
    }
    .ce-app .ce-footer-meta .footer-note {
      margin: 0;
      color: inherit;
      text-shadow: none;
      font-size: inherit;
      font-weight: 600;
    }
    .ce-app .ce-footer-meta .footer-version {
      margin: 0;
      color: rgba(107, 58, 20, 0.65);
      letter-spacing: 0.02em;
      font-size: inherit;
    }
    .ce-app .ce-footer-pill {
      display: inline-block;
      background: linear-gradient(180deg, #ffffff 0%, #fff7e0 100%);
      color: #5a3a14;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid #ffb347;
      box-shadow: 0 2px 4px rgba(180, 90, 0, 0.18);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .ce-app .ce-footer-pill:hover { background: #fff; }
    .ce-app .ce-footer-meta .btn-reset {
      background: transparent;
      color: rgba(107, 58, 20, 0.75);
      font-size: 0.72rem;
      padding: 2px 8px;
      border: 1px dashed rgba(107, 58, 20, 0.35);
      border-radius: 999px;
    }
    .ce-app .ce-footer .bmc-btn { margin: 0; }

    /* Floating +5 / +N popups spawned when the man trips or dodges */
    .ce-popup {
      position: absolute;
      font-weight: 800;
      font-size: 1.4rem;
      color: #ff8800;
      text-shadow: 0 2px 0 #fff, 0 0 8px rgba(255, 136, 0, 0.5);
      pointer-events: none;
      z-index: 4;
      animation: ce-pop 1.1s ease-out forwards;
    }
    @keyframes ce-pop {
      0%   { transform: translate(-50%, 0)    scale(0.6); opacity: 0; }
      20%  { transform: translate(-50%, -8px) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -54px) scale(1);  opacity: 0; }
    }


    /* Cutscene styles removed — intro disabled. */
</head>
<body>
  <div class="app ce-app">
    <header class="header">
      <h1 class="title">Coffee Escape ☕🏃</h1>
      <p class="subtitle">He wants his coffee. You want freedom.</p>
    </header>

    <main class="arcade-main" aria-label="Coffee Escape game">
      <div id="ceStage" class="ce-stage" aria-label="Game play area">
        <canvas id="ceCanvas" class="ce-canvas" aria-label="Coffee Escape play field"></canvas>

        <!-- Control hint: small compact overlay inside the stage, at
             the bottom center on desktop, above the action buttons on
             mobile. Two text spans: desktop (keyboard) and mobile
             (touch/swipe). Only one is shown at a time via CSS. -->
        <div id="ceHint" class="ce-floating-cta" aria-hidden="true">
          <span class="ce-floating-cta-desktop">SPACE / ↑ jump · A / D lanes · SHIFT boost</span>
          <span class="ce-floating-cta-mobile">Swipe ↑ jump · ← → lanes</span>
        </div>

        <!-- HUD: shown during play -->
        <div id="ceHud" class="ce-hud" hidden>
          <div class="ce-hud-item">
            <span class="ce-hud-label">Score</span>
            <span id="ceScore" class="ce-hud-value">0</span>
          </div>
          <div class="ce-hud-item ce-hud-best">
            <span class="ce-hud-label">Best</span>
            <span id="ceBestHud" class="ce-hud-value">0</span>
          </div>
        </div>

        <!-- Mobile action buttons. Hidden on desktop via media query. -->
        <div class="ce-actions-bar">
          <button id="ceBoostBtn" class="ce-boost-btn" type="button" aria-label="Boost">
            <span class="ce-btn-icon" aria-hidden="true">⚡</span>
            <span>BOOST</span>
            <div class="ce-boost-fill" id="ceBoostFill"></div>
          </button>
          <button id="ceJumpBtn" class="ce-jump-btn" type="button" aria-label="Jump">
            <span class="ce-btn-icon" aria-hidden="true">⤴</span>
            <span>JUMP</span>
          </button>
        </div>

        <!-- Boost meter (small bar in the bottom-left). Pointer-events
             disabled so taps fall through to the stage. -->
        <div class="ce-boost-hud-label">CAFFEINE</div>
        <div class="ce-boost-hud" aria-hidden="true">
          <div class="ce-boost-hud-fill" id="ceBoostHudFill"></div>
        </div>

        <!-- Start screen -->
        <div id="ceStartOverlay" class="ce-overlay" hidden>
          <div class="ce-card">
            <h2>☕ Coffee Escape</h2>
            <p class="ce-tagline">He wants his coffee. You want freedom.</p>
            <p style="font-size: 0.88rem; color: #8a5a2c; margin-bottom: 10px;">
              <span class="ce-hint-desktop">Desktop: A/D or ← → to move · Space/↑ to jump · Shift to boost.</span>
              <span class="ce-hint-mobile">Mobile: Swipe ← → to move · Swipe ↑ to jump.</span>
            </p>
            <p style="font-size: 0.78rem; color: #a08060; margin: 0 0 6px;">Avoid obstacles. Collect caffeine. Escape as long as you can.</p>
            <div class="ce-actions">
              <button id="ceStartBtn" class="btn btn-primary btn-large" type="button">Start Running ☕</button>
              <a class="btn btn-secondary" href="index.html">Back to Arcade</a>
            </div>
            <div class="best-row" style="margin-top: 14px;">
              <span class="best-label">Best Score:</span>
              <span id="ceBestStart" class="best-value">0</span>
            </div>
          </div>
        </div>

        <!-- Game over screen -->
        <div id="ceGameOverOverlay" class="ce-overlay" hidden>
          <div class="ce-card">
            <h2 id="ceOverTitle">Caught! ☕😱</h2>
            <div id="ceNewBest" class="ce-new-best" hidden>NEW BEST!</div>
            <div class="ce-result-grid">
              <div class="ce-result-item" id="ceFinalScoreItem">
                <span class="ce-result-label">Score</span>
                <span id="ceFinalScore" class="ce-result-value final">0</span>
              </div>
              <div class="ce-result-item" id="ceFinalBestItem">
                <span class="ce-result-label">Best</span>
                <span id="ceFinalBest" class="ce-result-value">0</span>
              </div>
            </div>
            <!-- Submit to the global leaderboard. Shown only on the
                 first game over (or when not yet submitted this run). -->
            <div class="ce-lb-submit" id="ceLbSubmit" hidden>
              <label class="ce-lb-label" for="ceLbNick">Nickname (1–12 chars)</label>
              <div class="ce-lb-row">
                <input id="ceLbNick" class="ce-lb-input" type="text" maxlength="12"
                       autocomplete="off" spellcheck="false"
                       placeholder="Your nickname" />
                <button id="ceLbSubmitBtn" class="ce-lb-btn" type="button">Submit</button>
              </div>
              <div id="ceLbStatus" class="ce-lb-status" aria-live="polite"></div>
            </div>
            <div class="ce-actions">
              <button id="ceTryAgainBtn" class="btn btn-primary" type="button">Try Again</button>
              <a class="btn btn-secondary" href="index.html">Back to Arcade</a>
            </div>
          </div>
        </div>

        <!-- "RUN!" stamp that flashes briefly when the run starts. -->
        <div id="ceRunStamp" class="ce-run-stamp" aria-hidden="true">RUN!</div>
      </div>
    </main>

    <footer class="footer ce-footer">
      <div class="ce-footer-row">
        <a href="https://www.buymeacoffee.com/sunboys" class="bmc-btn" target="_blank" rel="noopener noreferrer" aria-label="Support CodeCup Studio">☕ Support CodeCup Studio</a>
        <a class="ce-footer-pill" href="leaderboard.html" aria-label="View global leaderboard">🌍 Leaderboard</a>
        <a class="ce-footer-pill" href="index.html" aria-label="Back to CodeCup Arcade">← Back to Arcade</a>
      </div>
      <div class="ce-footer-row ce-footer-meta">
        <span class="footer-note">Made with love and caffeine.</span>
        <span class="footer-version">Coffee Escape v2.4</span>
        <button id="ceResetBest" class="btn-reset" type="button" aria-label="Reset best score">Reset Best</button>
      </div>
    </footer>
  </div>

  <!-- Three.js (pinned) for the 3D scene. Loaded from jsdelivr with a
       specific version so a CDN hiccup or API change doesn't break the
       game on a future visit. -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="leaderboard-client.js"></script>
  <script src="coffee-escape.js"></script>
</body>
</html>
