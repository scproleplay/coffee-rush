<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account · CodeCup Arcade ☕</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Account page — small, self-contained. Reuses existing button
       and form styles from style.css where possible. */
    .auth-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 18px;
    }
    .auth-tab {
      padding: 8px 18px;
      border-radius: 999px;
      border: 2px solid #ffb347;
      background: #fff;
      color: #b25e00;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .auth-tab.is-active {
      background: #ffb347;
      color: #fff;
    }
    .auth-form {
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .auth-form.is-active { display: flex; }
    .auth-form label {
      text-align: left;
      font-weight: 700;
      color: #5a3a14;
      font-size: 0.85rem;
    }
    .auth-form input {
      padding: 10px 12px;
      border: 2px solid #ffb347;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      background: #fff7e6;
      color: #5a3a14;
    }
    .auth-form input:focus {
      outline: none;
      border-color: #ff8800;
      background: #fff;
    }
    .auth-error {
      color: #c0392b;
      font-weight: 600;
      min-height: 1.2em;
      font-size: 0.9rem;
    }
    .auth-success {
      color: #2e7d32;
      font-weight: 600;
      min-height: 1.2em;
      font-size: 0.9rem;
    }
    .auth-card {
      background: #fff;
      border: 3px solid #ffb347;
      border-radius: 16px;
      padding: 22px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.15);
    }
    .auth-card h1 {
      color: #b25e00;
      margin: 0 0 6px;
      font-size: 1.6rem;
    }
    .auth-card p {
      color: #5a3a14;
      margin: 6px 0 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">Make an account ☕</h1>
      <p class="subtitle">Save scores across devices and join the leaderboard.</p>
    </header>

    <main class="arcade-main" aria-label="Account">
      <div class="auth-card">
        <div class="auth-tabs" role="tablist" aria-label="Sign in or sign up">
          <button id="authTabUp" class="auth-tab is-active" type="button" role="tab" aria-selected="true">Sign Up</button>
          <button id="authTabIn" class="auth-tab" type="button" role="tab" aria-selected="false">Log In</button>
        </div>

        <form id="authFormUp" class="auth-form is-active" autocomplete="on" novalidate>
          <p>Create a CodeCup Arcade account.</p>
          <label for="authUpNick">Nickname (1–12 characters)</label>
          <input id="authUpNick" type="text" maxlength="12" autocomplete="nickname" required />
          <label for="authUpEmail">Email</label>
          <input id="authUpEmail" type="email" autocomplete="email" required />
          <label for="authUpPass">Password (6+ characters)</label>
          <input id="authUpPass" type="password" minlength="6" autocomplete="new-password" required />
          <div id="authUpStatus" class="auth-error" aria-live="polite"></div>
          <button id="authUpBtn" class="btn btn-primary" type="submit">Create Account ☕</button>
        </form>

        <form id="authFormIn" class="auth-form" autocomplete="on" novalidate>
          <p>Welcome back.</p>
          <label for="authInEmail">Email</label>
          <input id="authInEmail" type="email" autocomplete="email" required />
          <label for="authInPass">Password</label>
          <input id="authInPass" type="password" autocomplete="current-password" required />
          <div id="authInStatus" class="auth-error" aria-live="polite"></div>
          <button id="authInBtn" class="btn btn-primary" type="submit">Log In</button>
        </form>
      </div>
    </main>

    <footer class="footer">
      <a href="https://www.buymeacoffee.com/sunboys" class="bmc-btn" target="_blank" rel="noopener noreferrer" aria-label="Support CodeCup Studio">☕ Support CodeCup Studio</a>
      <p class="footer-note">Made with love and caffeine.</p>
      <p class="arcade-back-line"><a class="arcade-back-pill" href="index.html" aria-label="Back to CodeCup Arcade">← Back to Arcade</a></p>
      <p class="footer-version">Account v1.0</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth-config.js"></script>
  <script src="auth-client.js"></script>
  <script>
    (function () {
      "use strict";

      // Tab switching
      var tabUp = document.getElementById("authTabUp");
      var tabIn = document.getElementById("authTabIn");
      var formUp = document.getElementById("authFormUp");
      var formIn = document.getElementById("authFormIn");
      var upStatus = document.getElementById("authUpStatus");
      var inStatus = document.getElementById("authInStatus");
      var upBtn = document.getElementById("authUpBtn");
      var inBtn = document.getElementById("authInBtn");

      function showTab(which) {
        var isUp = which === "up";
        tabUp.classList.toggle("is-active", isUp);
        tabIn.classList.toggle("is-active", !isUp);
        tabUp.setAttribute("aria-selected", isUp ? "true" : "false");
        tabIn.setAttribute("aria-selected", !isUp ? "true" : "false");
        formUp.classList.toggle("is-active", isUp);
        formIn.classList.toggle("is-active", !isUp);
        upStatus.textContent = "";
        inStatus.textContent = "";
      }
      tabUp.addEventListener("click", function () { showTab("up"); });
      tabIn.addEventListener("click", function () { showTab("in"); });

      function setBusy(form, busy) {
        var btns = form.querySelectorAll("button");
        btns.forEach(function (b) { b.disabled = busy; });
      }

      // Sign up
      formUp.addEventListener("submit", function (e) {
        e.preventDefault();
        upStatus.classList.remove("auth-success");
        upStatus.classList.add("auth-error");
        upStatus.textContent = "";
        var nickname = document.getElementById("authUpNick").value;
        var email = document.getElementById("authUpEmail").value;
        var password = document.getElementById("authUpPass").value;
        setBusy(formUp, true);
        window.Auth.signUp(email, password, nickname).then(function (res) {
          setBusy(formUp, false);
          if (!res.ok) {
            upStatus.textContent = (res.error && res.error.message) || "Sign up failed.";
            return;
          }
          if (res.needsConfirm) {
            upStatus.classList.remove("auth-error");
            upStatus.classList.add("auth-success");
            upStatus.textContent = "Account created. Check your email to confirm, then log in.";
            return;
          }
          // Signed in immediately — bounce to arcade.
          window.location.href = "index.html";
        });
      });

      // Log in
      formIn.addEventListener("submit", function (e) {
        e.preventDefault();
        inStatus.classList.remove("auth-success");
        inStatus.classList.add("auth-error");
        inStatus.textContent = "";
        var email = document.getElementById("authInEmail").value;
        var password = document.getElementById("authInPass").value;
        setBusy(formIn, true);
        window.Auth.signIn(email, password).then(function (res) {
          setBusy(formIn, false);
          if (!res.ok) {
            inStatus.textContent = (res.error && res.error.message) || "Log in failed.";
            return;
          }
          window.location.href = "index.html";
        });
      });

      // If already signed in, bounce to the arcade.
      window.Auth.getUser().then(function (u) {
        if (u && u.email) {
          window.location.href = "index.html";
        }
      });
    })();
  </script>
</body>
</html>
