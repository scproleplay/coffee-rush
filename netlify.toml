# Netlify configuration for Coffee Rush
# Tells Netlify the site is plain static files at the repo root.
# Without this, Netlify may default to publishing from a "dist" or
# "public" folder, which would leave the deployed site blank.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"
